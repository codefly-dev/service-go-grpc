version: v1
managed:
  enabled: false
plugins:
  - plugin: buf.build/protocolbuffers/go
    out: ../code/pkg/gen
    opt: paths=source_relative
  - plugin: buf.build/grpc/go
    out: ../code/pkg/gen
    opt: paths=source_relative
  - name: grpc-gateway
    out: ../code/pkg/gen
    opt:
      - paths=source_relative
  - plugin: buf.build/connectrpc/go
    out: ../code/pkg/gen
    opt: paths=source_relative
  - name: openapiv2
    out: ../openapi
